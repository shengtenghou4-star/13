name: Phase 0.13 real-input sensitivity validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/phase13-sensitivity-validation.yml"
      - "docs/PHASE0_13_REAL_INPUT_SENSITIVITY.md"
      - "examples/run_phase13_private_real_campaign.py"
      - "src/houearth/phase13_protocol.py"
      - "src/houearth/phase13_trials.py"
      - "src/houearth/phase13_analysis.py"
      - "src/houearth/phase13_sensitivity.py"
      - "tests/test_phase13_sensitivity.py"
  push:
    branches:
      - main
      - "agent/v0.13-*"
    paths:
      - ".github/workflows/phase13-sensitivity-validation.yml"
      - "docs/PHASE0_13_REAL_INPUT_SENSITIVITY.md"
      - "examples/run_phase13_private_real_campaign.py"
      - "src/houearth/phase13_protocol.py"
      - "src/houearth/phase13_trials.py"
      - "src/houearth/phase13_analysis.py"
      - "src/houearth/phase13_sensitivity.py"
      - "tests/test_phase13_sensitivity.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sensitivity-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Attack Phase 0.13 plan, recovery layers, and checkpoints
        run: pytest -q tests/test_phase13_sensitivity.py
      - name: Run complete repository regression
        run: pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/phase13-cli-smoke
