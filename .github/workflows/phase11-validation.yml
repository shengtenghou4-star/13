name: Phase 0.11 ranked-pool expansion validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/phase11-validation.yml"
      - "data/phase11_expanded_target_pool.csv"
      - "docs/PHASE0_11_EXPANDED_BLIND_CAMPAIGN.md"
      - "examples/run_phase11_private_real_campaign.py"
      - "pyproject.toml"
      - "src/houearth/**"
      - "tests/test_phase11_*.py"
  push:
    branches:
      - main
      - "agent/v0.11-*"
    paths:
      - ".github/workflows/phase11-validation.yml"
      - "data/phase11_expanded_target_pool.csv"
      - "docs/PHASE0_11_EXPANDED_BLIND_CAMPAIGN.md"
      - "examples/run_phase11_private_real_campaign.py"
      - "pyproject.toml"
      - "src/houearth/**"
      - "tests/test_phase11_*.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ranked-pool-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Verify development package version
        run: python -c "import houearth; assert houearth.__version__ == '0.12.0.dev0'"
      - name: Test frozen pool, catalog audit, deterministic fallback, and private campaign
        run: pytest -q tests/test_phase11_protocol.py tests/test_phase11_campaign.py
      - name: Run complete repository regression
        run: pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/phase11-cli-smoke
