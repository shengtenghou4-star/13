name: Phase 0.12 atomic checkpoint validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/phase12-checkpoint-validation.yml"
      - "docs/PHASE0_12_ATOMIC_CHECKPOINTS.md"
      - "src/houearth/phase12_checkpoints.py"
      - "tests/test_phase12_checkpoints.py"
      - "src/houearth/**"
      - "tests/**"
  push:
    branches:
      - main
      - "agent/v0.12-atomic-*"
    paths:
      - ".github/workflows/phase12-checkpoint-validation.yml"
      - "docs/PHASE0_12_ATOMIC_CHECKPOINTS.md"
      - "src/houearth/phase12_checkpoints.py"
      - "tests/test_phase12_checkpoints.py"
      - "src/houearth/**"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checkpoint-protocol:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Attack atomic writes, identity binding, and batch receipts
        run: pytest -q tests/test_phase12_checkpoints.py
      - name: Run complete repository regression
        run: pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/phase12-checkpoint-cli-smoke
