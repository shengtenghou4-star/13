name: Phase 0.9 candidate calibration validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/candidate-campaign-validation.yml"
      - ".github/workflows/candidate-freeze-validation.yml"
      - "docs/PHASE0_9_BLIND_REAL_CAMPAIGN.md"
      - "examples/run_phase09_candidate_calibration_fixture.py"
      - "examples/validate_candidate_campaign_evidence.py"
      - "pyproject.toml"
      - "src/houearth/**"
      - "tests/**"
  push:
    branches:
      - main
      - "agent/v0.9-*"
    paths:
      - ".github/workflows/candidate-campaign-validation.yml"
      - ".github/workflows/candidate-freeze-validation.yml"
      - "docs/PHASE0_9_BLIND_REAL_CAMPAIGN.md"
      - "examples/run_phase09_candidate_calibration_fixture.py"
      - "examples/validate_candidate_campaign_evidence.py"
      - "pyproject.toml"
      - "src/houearth/**"
      - "tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthetic-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Verify development package version
        run: python -c "import houearth; assert houearth.__version__ == '0.10.0.dev0'"
      - name: Test calibration and independent attack validation
        run: pytest -q tests/test_candidate_campaign.py tests/test_candidate_campaign_validation.py
      - name: Run complete repository regression
        run: pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/phase09-cli-smoke
      - name: Resolve immutable source commit
        id: source
        shell: bash
        run: |
          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate synthetic three-target calibration fixture
        run: >-
          python examples/run_phase09_candidate_calibration_fixture.py
          --source-commit "${{ steps.source.outputs.sha }}"
          --output outputs/candidate-calibration-fixture-v0.9
      - name: Independently revalidate serialized candidate table
        run: >-
          python examples/validate_frozen_candidate_table.py
          outputs/candidate-calibration-fixture-v0.9/candidate_table.json
          --report outputs/candidate-calibration-fixture-v0.9/second_table_validation_report.json
      - name: Independently revalidate serialized Phase 0.8 evidence
        run: >-
          python examples/validate_candidate_evidence.py
          outputs/candidate-calibration-fixture-v0.9/candidate_evidence.json
          --report outputs/candidate-calibration-fixture-v0.9/second_evidence_validation_report.json
      - name: Independently revalidate complete Phase 0.9 campaign evidence
        run: >-
          python examples/validate_candidate_campaign_evidence.py
          outputs/candidate-calibration-fixture-v0.9/candidate_campaign_evidence.json
          --report outputs/candidate-calibration-fixture-v0.9/second_campaign_validation_report.json
      - name: Assert unopened synthetic output
        run: >-
          python -c "import json,pathlib;
          p=json.loads(pathlib.Path('outputs/candidate-calibration-fixture-v0.9/candidate_table.json').read_text());
          assert all(r['manual_review_status']=='unopened' and r['astrophysical_status']=='unclassified' for r in p['candidates'])"
      - name: Record validated commit
        run: echo "${{ steps.source.outputs.sha }}" > outputs/candidate-calibration-fixture-v0.9/validated_commit.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: candidate-calibration-fixture-v0.9
          path: |
            outputs/candidate-calibration-fixture-v0.9/
            outputs/phase09-cli-smoke/
