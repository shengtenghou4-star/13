name: TOI-700 d long-period benchmark

on:
  workflow_dispatch:

jobs:
  toi700d:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[tess]'
      - run: houearth benchmark toi700d
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-toi700d
          path: outputs/benchmarks/toi700d/
