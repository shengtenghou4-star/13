name: Phase 0.12 exact source bundle

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/phase12-source-bundle.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  EXACT_SOURCE: "758f56098bcdc871627bc3fc92daa2cbd25dbcce"

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout temporary bundler branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout exact validated source
        uses: actions/checkout@v4
        with:
          repository: shengtenghou4-star/13
          ref: ${{ env.EXACT_SOURCE }}
          path: exact-source
          fetch-depth: 1

      - name: Verify exact source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C exact-source rev-parse HEAD)" = "$EXACT_SOURCE"
          test "$(git -C exact-source status --porcelain)" = ""
          test -f exact-source/src/houearth/phase12_resume_campaign.py
          test -f exact-source/src/houearth/phase12_locked_inputs.py

      - name: Build deterministic source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source-bundle
          git -C exact-source archive --format=tar.gz \
            --prefix=houearth-${EXACT_SOURCE}/ \
            -o "../source-bundle/houearth-${EXACT_SOURCE}.tar.gz" \
            "$EXACT_SOURCE"
          sha256sum source-bundle/*.tar.gz > source-bundle/SHA256SUMS.txt
          printf '%s\n' "$EXACT_SOURCE" > source-bundle/SOURCE_COMMIT.txt

      - uses: actions/upload-artifact@v4
        with:
          name: houearth-phase12-exact-source
          path: source-bundle/
          if-no-files-found: error
          retention-days: 7
