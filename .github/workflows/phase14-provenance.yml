name: Phase 0.14 execution provenance validation

on:
  pull_request:
    paths:
      - "src/houearth/phase14_provenance.py"
      - "src/houearth/phase14_maximum.py"
      - "tests/test_phase14_provenance.py"
      - "tests/test_phase14_maximum.py"
      - "docs/PHASE0_14_EXECUTION_PROVENANCE_AMENDMENT.md"
      - ".github/workflows/phase14-provenance.yml"
  workflow_dispatch:

jobs:
  provenance-amendment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Attack execution amendment gate
        run: >-
          python -m pytest -q
          tests/test_phase14_provenance.py
          tests/test_phase14_maximum.py
      - name: Run complete repository regression
        run: python -m pytest -q
