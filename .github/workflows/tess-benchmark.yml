name: TESS real-data benchmark

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tess-benchmark.yml"
      - "src/**"
      - "examples/benchmark_pi_men.py"

jobs:
  pi-men-sector-1:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[tess]'
      - run: python examples/benchmark_pi_men.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pi-men-sector-1-benchmark
          path: outputs/pi-men-benchmark/
