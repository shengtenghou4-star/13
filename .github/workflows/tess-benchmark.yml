name: TESS known-planet benchmarks

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/tess-benchmark.yml"
      - "src/**"
      - "examples/run_benchmark.py"

jobs:
  fast-benchmarks:
    strategy:
      fail-fast: false
      matrix:
        target: [lhs3844b, pimenc]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[tess]'
      - run: houearth benchmark "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-${{ matrix.target }}
          path: outputs/benchmarks/${{ matrix.target }}/
