name: Phase 0.14 power restoration validation

on:
  pull_request:
    paths:
      - "src/houearth/phase14_power_restore.py"
      - "tests/test_phase14_power_restore.py"
      - "docs/PHASE0_14_POWER_RESTORE.md"
      - "results/phase0_14/**"
      - ".github/workflows/phase14-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  power-restore-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Attack Phase 0.14 power-restoration protocol
        run: python -m pytest -q tests/test_phase14_power_restore.py
      - name: Run complete repository regression
        run: python -m pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/ci-demo
