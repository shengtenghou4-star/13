name: Single-transit completeness

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/completeness.yml"
      - "src/houearth/evaluation.py"
      - "src/houearth/search.py"
      - "src/houearth/preprocess.py"

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: houearth calibrate-single
      - uses: actions/upload-artifact@v4
        with:
          name: single-transit-completeness
          path: outputs/single-transit-completeness/
