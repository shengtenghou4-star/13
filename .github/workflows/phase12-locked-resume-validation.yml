name: Phase 0.12 locked-input resume validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/phase12-locked-resume-validation.yml"
      - "docs/PHASE0_12_LOCKED_INPUT_RESUME.md"
      - "examples/run_phase12_locked_campaign.py"
      - "src/houearth/phase12_locked_inputs.py"
      - "src/houearth/phase12_resume_campaign.py"
      - "tests/test_phase12_locked_resume.py"
  push:
    branches:
      - main
      - "agent/v0.12-locked-*"
    paths:
      - ".github/workflows/phase12-locked-resume-validation.yml"
      - "docs/PHASE0_12_LOCKED_INPUT_RESUME.md"
      - "examples/run_phase12_locked_campaign.py"
      - "src/houearth/phase12_locked_inputs.py"
      - "src/houearth/phase12_resume_campaign.py"
      - "tests/test_phase12_locked_resume.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  locked-input-resume:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Verify Phase 0.12 development package
        run: python -c "import houearth; assert houearth.__version__ == '0.12.0.dev0'"
      - name: Attack locked bytes, hashes, batch identity, and no-network boundary
        run: pytest -q tests/test_phase12_locked_resume.py
      - name: Run complete repository regression
        run: pytest -q
      - name: Run original synthetic CLI smoke test
        run: houearth synthetic --baseline 30 --min-period 2 --max-period 12 --output outputs/phase12-locked-cli-smoke
